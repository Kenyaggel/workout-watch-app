# XcodeGen spec — optional. Run `xcodegen generate` to (re)create WorkoutApp.xcodeproj.
# Install xcodegen with: brew install xcodegen
name: WorkoutApp
options:
  bundleIdPrefix: com.mayap.workoutapp
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"

packages:
  WorkoutCore:
    path: WorkoutCore

targets:
  WorkoutWatch:
    type: application
    platform: watchOS
    sources:
      - path: WatchApp
    info:
      path: WatchApp/Info.plist
    entitlements:
      path: WatchApp/WorkoutApp.entitlements
    dependencies:
      - package: WorkoutCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayap.workoutapp.watchkitapp
        INFOPLIST_KEY_CFBundleDisplayName: Workout
        INFOPLIST_KEY_WKWatchOnly: "YES"
        INFOPLIST_KEY_WKApplication: "YES"
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: "YES"

  WorkoutPhone:
    type: application
    platform: iOS
    sources:
      - path: iPhoneApp
    dependencies:
      - package: WorkoutCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayap.workoutapp
        INFOPLIST_KEY_CFBundleDisplayName: Workout
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
